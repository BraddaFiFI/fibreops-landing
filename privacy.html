<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Privacy Policy — FibreOps</title>
  <link rel="icon" type="image/png" href="/icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #fff; color: #1a1a1a; padding: 40px 24px; max-width: 860px; margin: 0 auto; }
    .topbar { display: flex; align-items: center; gap: 10px; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 2px solid #f97316; }
    .logo-mark { width: 36px; height: 36px; background: #f97316; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; color: #000; }
    .logo-text { font-size: 20px; font-weight: 700; color: #0a0a0a; }
    .back-link { margin-left: auto; font-size: 13px; color: #f97316; text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
    .footer { margin-top: 48px; padding-top: 20px; border-top: 1px solid #e5e7eb; font-size: 12px; color: #aaa; text-align: center; }
    [data-custom-class='body'], [data-custom-class='body'] * { background: transparent !important; }
    [data-custom-class='title'], [data-custom-class='title'] * { font-family: Arial !important; font-size: 26px !important; color: #000000 !important; }
    [data-custom-class='subtitle'], [data-custom-class='subtitle'] * { font-family: Arial !important; color: #595959 !important; font-size: 14px !important; }
    [data-custom-class='heading_1'], [data-custom-class='heading_1'] * { font-family: Arial !important; font-size: 19px !important; color: #000000 !important; }
    [data-custom-class='heading_2'], [data-custom-class='heading_2'] * { font-family: Arial !important; font-size: 17px !important; color: #000000 !important; }
    [data-custom-class='body_text'], [data-custom-class='body_text'] * { color: #595959 !important; font-size: 14px !important; font-family: Arial !important; }
    [data-custom-class='link'], [data-custom-class='link'] * { color: #f97316 !important; font-size: 14px !important; font-family: Arial !important; word-break: break-word !important; }
    ul { list-style-type: square; margin: 10px 0 14px 24px; }
    ul > li > ul { list-style-type: circle; }
    ul > li > ul > li > ul { list-style-type: square; }
    ol li { font-family: Arial; }
    h1, h2, h3 { margin: 24px 0 12px; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="logo-mark">F</div>
    <div class="logo-text">FibreOps</div>
    <a href="/" class="back-link">← Back to homepage</a>
  </div>

  <div class="footer">

  </div>
</body>
</html>
