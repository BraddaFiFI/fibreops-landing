<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Securr">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1f3d">
<meta name="robots" content="noindex, nofollow">
<title>Securr — Ground Team</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
--navy:#0f1f3d;--navy-mid:#162847;--navy-light:#1e3a5f;
--navy-border:rgba(255,255,255,0.07);--grey-card:#1e2438;--grey-hover:#242b40;
--orange:#f97316;--green:#16a34a;--red:#dc2626;--blue:#3b82f6;
--text-primary:#f0f0f0;--text-secondary:#9ca3af;--text-muted:#6b7280;
}
html,body{height:100%;margin:0;overflow:hidden;background:var(--navy)}
body{font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}
h1,h2,h3,h4,.logo-name{font-family:'Space Grotesk',sans-serif}

/* LOADING */
.loading-screen{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:1000;flex-direction:column;gap:16px}
.loading-logo{width:56px;height:56px;background:var(--orange);border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:26px;color:#fff;font-family:'Space Grotesk',sans-serif}
.loading-text{font-size:14px;color:var(--text-muted)}
.loading-spinner{width:22px;height:22px;border:2px solid rgba(249,115,22,0.2);border-top-color:var(--orange);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* TOPBAR */
.topbar{background:var(--navy-mid);border-bottom:1px solid var(--navy-border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;padding-top:max(12px, env(safe-area-inset-top))}
.topbar-logo{display:flex;align-items:center;gap:8px}
.logo-mark{width:28px;height:28px;background:var(--orange);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;font-family:'Space Grotesk',sans-serif}
.logo-name{font-size:16px;font-weight:700;color:var(--text-primary);letter-spacing:-0.3px}
.topbar-right{display:flex;align-items:center;gap:10px}
.notif-btn{width:32px;height:32px;background:rgba(249,115,22,0.1);border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative}
.notif-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;background:var(--orange);border-radius:50%;display:none}
.notif-dot.show{display:block}
.signout-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);padding:4px;display:flex;align-items:center}

/* SCROLL AREA */
.scroll-area{flex:1;overflow-y:auto;padding:16px;padding-bottom:max(80px, calc(64px + env(safe-area-inset-bottom)));display:flex;flex-direction:column;gap:12px}

/* GREETING */
.greeting-card{background:var(--grey-card);border:1px solid var(--navy-border);border-radius:14px;padding:16px 18px;animation:slideUp 0.4s ease}
.greeting-sub{font-size:12px;color:var(--text-muted);margin-bottom:2px}
.greeting-name{font-size:20px;font-weight:800;color:var(--text-primary);letter-spacing:-0.5px;font-family:'Space Grotesk',sans-serif}
.greeting-role{font-size:12px;color:var(--text-secondary);margin-top:3px}
.greeting-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:14px}
.greeting-stat{background:var(--navy-mid);border-radius:8px;padding:10px;text-align:center}
.greeting-stat-num{font-size:20px;font-weight:800;color:var(--text-primary);font-family:'Space Grotesk',sans-serif}
.greeting-stat-num.orange{color:var(--orange)}
.greeting-stat-num.blue{color:var(--blue)}
.greeting-stat-num.green{color:var(--green)}
.greeting-stat-label{font-size:10px;color:var(--text-muted);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px}

/* SECTION LABEL */
.section-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;font-family:'Space Grotesk',sans-serif;padding:0 2px}

/* NOTIFICATION BANNER */
.notif-banner{background:rgba(249,115,22,0.1);border:1px solid rgba(249,115,22,0.25);border-radius:12px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start;animation:slideUp 0.3s ease}
.notif-banner-icon{width:32px;height:32px;background:rgba(249,115,22,0.15);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.notif-banner-title{font-size:13px;font-weight:700;color:var(--text-primary);margin-bottom:2px;font-family:'Space Grotesk',sans-serif}
.notif-banner-text{font-size:12px;color:var(--text-secondary);line-height:1.4}
.notif-banner-time{font-size:11px;color:var(--text-muted);margin-top:3px}

/* DISPATCH CARD */
.dispatch-card{background:var(--grey-card);border:1px solid var(--navy-border);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform 0.15s;animation:slideUp 0.4s ease}
.dispatch-card:active{transform:scale(0.98)}
.dispatch-card-top{padding:14px 16px;border-left:3px solid var(--orange)}
.dispatch-card-top.blue{border-left-color:var(--blue)}
.dispatch-card-top.green{border-left-color:var(--green)}
.dispatch-card-top.red{border-left-color:var(--red)}
.dispatch-card-top.grey{border-left-color:#4b5563}
.dispatch-card-ob{font-size:10px;color:var(--text-muted);font-family:monospace;margin-bottom:4px}
.dispatch-card-type{font-size:16px;font-weight:700;color:var(--text-primary);margin-bottom:3px;font-family:'Space Grotesk',sans-serif}
.dispatch-card-client{font-size:13px;color:var(--text-secondary);margin-bottom:10px}
.dispatch-card-meta{display:flex;align-items:center;justify-content:space-between}
.status-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:100px;font-size:11px;font-weight:700;font-family:'Space Grotesk',sans-serif}
.status-pill.new{background:rgba(249,115,22,0.15);color:var(--orange)}
.status-pill.dispatched{background:rgba(59,130,246,0.15);color:var(--blue)}
.status-pill.on_scene{background:rgba(22,163,74,0.15);color:var(--green)}
.status-pill.handover{background:rgba(156,163,175,0.12);color:#9ca3af}
.status-pill.back_to_base{background:rgba(156,163,175,0.12);color:#9ca3af}
.status-pill.requires_action{background:rgba(220,38,38,0.15);color:var(--red)}
.status-pill.closed{background:rgba(156,163,175,0.08);color:#6b7280}
.status-pill-dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.dispatch-card-time{font-size:11px;color:var(--text-muted)}
.dispatch-card-site{padding:10px 16px;background:var(--navy-mid);border-top:1px solid var(--navy-border);display:flex;align-items:center;gap:8px}
.dispatch-card-site-text{font-size:12px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* CLOCK CARD */
.clock-card{background:var(--grey-card);border:1px solid var(--navy-border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.clock-info{display:flex;flex-direction:column;gap:2px}
.clock-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;font-family:'Space Grotesk',sans-serif}
.clock-site{font-size:13px;font-weight:600;color:var(--text-primary);font-family:'Space Grotesk',sans-serif}
.clock-timer{font-size:22px;font-weight:800;color:var(--green);font-family:'Space Grotesk',sans-serif;letter-spacing:-0.5px}
.clock-out-btn{background:rgba(220,38,38,0.12);border:1px solid rgba(220,38,38,0.25);color:var(--red);padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Space Grotesk',sans-serif}

/* EMPTY STATE */
.empty-state{text-align:center;padding:48px 20px;color:var(--text-muted)}
.empty-icon{width:56px;height:56px;background:var(--grey-card);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.empty-state h3{font-size:16px;font-weight:700;color:var(--text-secondary);margin-bottom:6px;font-family:'Space Grotesk',sans-serif}
.empty-state p{font-size:13px;line-height:1.6}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--navy-mid);border-top:1px solid var(--navy-border);display:flex;padding-bottom:max(8px, env(safe-area-inset-bottom));z-index:50}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 8px;cursor:pointer;transition:color 0.15s;color:var(--text-muted);border:none;background:none}
.nav-tab.active{color:var(--orange)}
.nav-tab-label{font-size:10px;font-weight:600;font-family:'Space Grotesk',sans-serif}
.nav-tab-badge{position:absolute;top:6px;right:calc(50% - 18px);background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:100px;font-family:'Space Grotesk',sans-serif}

/* DETAIL SHEET */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;display:none;align-items:flex-end}
.sheet-overlay.show{display:flex}
.sheet{background:var(--grey-card);border-radius:20px 20px 0 0;width:100%;max-width:480px;margin:0 auto;max-height:92vh;overflow-y:auto;padding-bottom:max(24px, env(safe-area-inset-bottom));animation:slideUp 0.3s ease}
.sheet-handle{width:36px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:12px auto 0}
.sheet-header{padding:16px 20px;border-bottom:1px solid var(--navy-border)}
.sheet-ob{font-size:11px;color:var(--text-muted);font-family:monospace;margin-bottom:3px}
.sheet-title{font-size:20px;font-weight:800;color:var(--text-primary);font-family:'Space Grotesk',sans-serif}
.sheet-body{padding:20px}
.sheet-section{margin-bottom:20px}
.sheet-section-title{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-family:'Space Grotesk',sans-serif}
.sheet-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--navy-border)}
.sheet-row:last-child{border-bottom:none}
.sheet-row-label{font-size:13px;color:var(--text-muted)}
.sheet-row-value{font-size:13px;color:var(--text-primary);font-weight:500;text-align:right;max-width:60%}

/* ACTION BUTTONS */
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.action-btn{padding:14px 10px;border-radius:12px;border:1px solid var(--navy-border);background:var(--navy-mid);color:var(--text-primary);font-size:13px;font-weight:700;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:all 0.15s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px}
.action-btn:active{transform:scale(0.97)}
.action-btn.primary{background:var(--orange);border-color:var(--orange);color:#fff}
.action-btn.success{background:rgba(22,163,74,0.12);border-color:rgba(22,163,74,0.3);color:var(--green)}
.action-btn.danger{background:rgba(220,38,38,0.12);border-color:rgba(220,38,38,0.3);color:var(--red)}
.action-btn.info{background:rgba(59,130,246,0.12);border-color:rgba(59,130,246,0.3);color:var(--blue)}
.action-btn-icon{font-size:20px}
.action-btn-full{width:100%;padding:16px;border-radius:12px;border:none;background:var(--orange);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Space Grotesk',sans-serif;margin-bottom:10px;transition:opacity 0.2s}
.action-btn-full:active{opacity:0.85}
.action-btn-full.green{background:var(--green)}
.action-btn-full.outline{background:transparent;border:1px solid var(--navy-border);color:var(--text-secondary)}

/* TIMELINE */
.timeline{display:flex;flex-direction:column;gap:0}
.timeline-item{display:flex;gap:12px;padding:8px 0;position:relative}
.timeline-dot{width:8px;height:8px;border-radius:50%;background:var(--orange);flex-shrink:0;margin-top:4px;position:relative;z-index:1}
.timeline-dot::after{content:"";position:absolute;top:8px;left:3px;width:2px;height:100%;background:var(--navy-border)}
.timeline-item:last-child .timeline-dot::after{display:none}
.timeline-content{flex:1}
.timeline-status{font-size:13px;font-weight:600;color:var(--text-primary);font-family:'Space Grotesk',sans-serif}
.timeline-time{font-size:11px;color:var(--text-muted);margin-top:1px}
.timeline-note{font-size:12px;color:var(--text-secondary);margin-top:3px}

/* NOTIFICATION TOAST */
.toast{position:fixed;top:max(20px, env(safe-area-inset-top));left:50%;transform:translateX(-50%) translateY(-100px);background:var(--grey-card);border:1px solid var(--navy-border);border-radius:12px;padding:12px 18px;font-size:14px;color:var(--text-primary);z-index:500;transition:transform 0.3s ease;width:calc(100% - 32px);max-width:440px;display:flex;align-items:center;gap:10px;font-family:'DM Sans',sans-serif}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{border-color:rgba(22,163,74,0.3)}
.toast.error{border-color:rgba(220,38,38,0.3)}
.toast-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.toast.success .toast-dot{background:var(--green)}
.toast.error .toast-dot{background:var(--red)}

/* SCROLLBAR */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--navy-border);border-radius:2px}
</style>
</head>

<!-- BOTTOM NAV -->

</nav>

<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-ob" id="sheet-ob"></div>

      <div class="sheet-section">
        <div class="sheet-section-title">Timeline</div>
        <div class="timeline" id="sheet-timeline"></div>
      </div>
    </div>
  </div>
</div>

function showToast(msg, type='success'){
  const el = document.getElementById('toast');
  document.getElementById('toast-text').textContent = msg;
  el.className = 'toast show ' + type;
  setTimeout(() => el.classList.remove('show'), 3500);
}

function formatDate(ts){
  if(!ts) return '—';
  return new Date(ts).toLocaleString('en-ZA',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
}

function timeSince(ts){
  if(!ts) return '';
  const diff = Math.floor((Date.now() - new Date(ts))/60000);
  if(diff < 1) return 'just now';
  if(diff < 60) return diff + 'm ago';
  return Math.floor(diff/60) + 'h ' + (diff%60) + 'm';
}

function formatDuration(startTs){
  const diff = Math.floor((Date.now() - new Date(startTs))/1000);
  const h = Math.floor(diff/3600);
  const m = Math.floor((diff%3600)/60);
  const s = diff%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

async function init(){
  const { data: { session } } = await sb.auth.getSession();
  if(!session){ window.location.href = '/login.html'; return; }
  currentUser = session.user;

  const { data: profile } = await sb.from('users')
    .select('*').eq('id', currentUser.id).single();

  if(!profile || !profile.is_active){
    await sb.auth.signOut();
    window.location.href = '/login.html';
    return;
  }

  if(profile.role !== 'ground_team'){
    if(['admin_controller','admin_supervisor'].includes(profile.role)){
      window.location.href = '/dashboard.html';
    } else {
      await sb.auth.signOut();
      window.location.href = '/login.html';
    }
    return;
  }

  currentProfile = profile;

  const { data: membership } = await sb.from('ground_team_members')
    .select('team_id').eq('user_id', currentUser.id).single();
  myTeamId = membership?.team_id || null;

  await loadDispatches();
  subscribeRealtime();

  document.getElementById('loading').style.display = 'none';
  showTab('dispatches');
}

async function loadDispatches(){
  if(!myTeamId){
    allDispatches = [];
    return;
  }
  const { data } = await sb.from('incidents')
    .select('*,clients(name),ground_teams(name)')
    .eq('organisation_id', currentProfile.organisation_id)
    .eq('team_id', myTeamId)
    .not('status', 'in', '("cancelled")')
    .order('created_at', { ascending: false });
  allDispatches = data || [];
}

function subscribeRealtime(){
  if(!myTeamId) return;
  realtimeChannel = sb.channel('mobile-' + currentProfile.organisation_id)
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'incidents',
      filter: 'organisation_id=eq.' + currentProfile.organisation_id
    }, async (payload) => {
      const inc = payload.new;
      if(inc && inc.team_id === myTeamId){
        if(payload.eventType === 'INSERT'){
          notifications.unshift({
            id: inc.id,
            title: 'New dispatch assigned',
            text: TYPE_LABELS[inc.dispatch_type] + ' — ' + (inc.site_address || 'No address'),
            time: new Date().toISOString(),
            read: false
          });
          document.getElementById('notif-dot').classList.add('show');
        }
        await loadDispatches();
        if(activeTab === 'dispatches') renderDispatches();
        if(activeTab === 'notifications') renderNotifications();
      }
    })
    .subscribe();
}

function showTab(tab){
  activeTab = tab;
  ['dispatches','notifications','profile'].forEach(t => {
    document.getElementById('tab-' + t)?.classList.remove('active');
  });
  document.getElementById('tab-' + tab)?.classList.add('active');
  if(tab === 'dispatches') renderDispatches();
  else if(tab === 'notifications') renderNotifications();
  else if(tab === 'profile') renderProfile();
}

function renderDispatches(){
  const area = document.getElementById('scroll-area');
  area.innerHTML = '';

  const active = allDispatches.filter(i => !['closed','cancelled'].includes(i.status));
  const closed = allDispatches.filter(i => i.status === 'closed');

  const greet = document.createElement('div');
  greet.className = 'greeting-card';
  greet.innerHTML = `
    <div class="greeting-sub">Good ${getTimeOfDay()},</div>
    <div class="greeting-name">${currentProfile.first_name} ${currentProfile.last_name}</div>
    <div class="greeting-role">Ground Team Member</div>
    <div class="greeting-stats">
      <div class="greeting-stat">
        <div class="greeting-stat-num orange">${active.length}</div>
        <div class="greeting-stat-label">Active</div>
      </div>
      <div class="greeting-stat">
        <div class="greeting-stat-num blue">${active.filter(i=>i.status==='dispatched').length}</div>
        <div class="greeting-stat-label">Dispatched</div>
      </div>
      <div class="greeting-stat">
        <div class="greeting-stat-num green">${active.filter(i=>i.status==='on_scene').length}</div>
        <div class="greeting-stat-label">On scene</div>
      </div>
    </div>
  `;
  area.appendChild(greet);

  if(clockInTime){
    const clockCard = document.createElement('div');
    clockCard.className = 'clock-card';
    clockCard.innerHTML = `
      <div class="clock-info">
        <div class="clock-label">Clocked in</div>
        <div class="clock-site">${clockInSite || 'On site'}</div>
        <div class="clock-timer" id="clock-timer-display">${formatDuration(clockInTime)}</div>
      </div>
      <button class="clock-out-btn" onclick="handleClockOut()">Clock out</button>
    `;
    area.appendChild(clockCard);
    if(clockTimer) clearInterval(clockTimer);
    clockTimer = setInterval(() => {
      const el = document.getElementById('clock-timer-display');
      if(el) el.textContent = formatDuration(clockInTime);
    }, 1000);
  }

  if(active.length === 0 && !clockInTime){
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = `
      <div class="empty-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="18" height="18" rx="3" stroke="#6b7280" stroke-width="1.5"/>
          <path d="M9 12h6M12 9v6" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h3>No active dispatches</h3>
      <p>You have no active dispatches right now. New assignments will appear here instantly.</p>
    `;
    area.appendChild(empty);
  } else {
    if(active.length > 0){
      const label = document.createElement('div');
      label.className = 'section-label';
      label.textContent = 'Active dispatches';
      area.appendChild(label);
      active.forEach(inc => area.appendChild(buildDispatchCard(inc)));
    }
  }

  if(closed.length > 0){
    const label = document.createElement('div');
    label.className = 'section-label';
    label.textContent = 'Closed today';
    area.appendChild(label);
    closed.slice(0,3).forEach(inc => area.appendChild(buildDispatchCard(inc)));
  }
}

function buildDispatchCard(inc){
  const card = document.createElement('div');
  card.className = 'dispatch-card';
  card.onclick = () => openSheet(inc.id);
  const borderClass = STATUS_BORDER[inc.status] || '';
  card.innerHTML = `
    <div class="dispatch-card-top ${borderClass}">
      <div class="dispatch-card-ob">${inc.ob_number}</div>
      <div class="dispatch-card-type">${TYPE_LABELS[inc.dispatch_type] || inc.dispatch_type}</div>
      <div class="dispatch-card-client">${inc.clients?.name || '—'}</div>
      <div class="dispatch-card-meta">
        <span class="status-pill ${inc.status}">
          <span class="status-pill-dot"></span>
          ${STATUS_LABELS[inc.status] || inc.status}
        </span>
        <span class="dispatch-card-time">${timeSince(inc.created_at)}</span>
      </div>
    </div>
    ${inc.site_address ? `
    <div class="dispatch-card-site">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M6 1C4.07 1 2.5 2.57 2.5 4.5c0 2.83 3.5 6.5 3.5 6.5s3.5-3.67 3.5-6.5C9.5 2.57 7.93 1 6 1z" stroke="#6b7280" stroke-width="1"/>
        <circle cx="6" cy="4.5" r="1" stroke="#6b7280" stroke-width="1"/>
      </svg>
      <span class="dispatch-card-site-text">${inc.site_address}</span>
    </div>` : ''}
  `;
  return card;
}

function renderNotifications(){
  const area = document.getElementById('scroll-area');
  area.innerHTML = '';
  document.getElementById('notif-dot').classList.remove('show');
  notifications.forEach(n => { n.read = true; });

  if(notifications.length === 0){
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = `
      <div class="empty-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M10 2a6.5 6.5 0 016.5 6.5c0 4 1.5 5.5 1.5 5.5H6s1.5-1.5 1.5-5.5A6.5 6.5 0 0110 2z" stroke="#6b7280" stroke-width="1.5"/>
          <path d="M8.5 18.5a1.5 1.5 0 003 0" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h3>No notifications</h3>
      <p>New dispatch assignments and updates will appear here.</p>
    `;
    area.appendChild(empty);
    return;
  }

  const label = document.createElement('div');
  label.className = 'section-label';
  label.textContent = 'Recent alerts';
  area.appendChild(label);

  notifications.forEach(n => {
    const banner = document.createElement('div');
    banner.className = 'notif-banner';
    banner.innerHTML = `
      <div class="notif-banner-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="6.5" stroke="#f97316" stroke-width="1.3"/>
          <path d="M8 5v3l2 1.5" stroke="#f97316" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="notif-banner-title">${n.title}</div>
        <div class="notif-banner-text">${n.text}</div>
        <div class="notif-banner-time">${timeSince(n.time)}</div>
      </div>
    `;
    if(n.id) banner.onclick = () => { openSheet(n.id); showTab('dispatches'); };
    area.appendChild(banner);
  });
}

function renderProfile(){
  const area = document.getElementById('scroll-area');
  area.innerHTML = '';
  const initials = (currentProfile.first_name?.[0]||'') + (currentProfile.last_name?.[0]||'');
  area.innerHTML = `
    <div class="greeting-card" style="text-align:center">
      <div style="width:64px;height:64px;background:var(--navy-light);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:var(--text-primary);margin:0 auto 12px;font-family:'Space Grotesk',sans-serif">${initials.toUpperCase()}</div>
      <div style="font-size:20px;font-weight:800;color:var(--text-primary);font-family:'Space Grotesk',sans-serif">${currentProfile.first_name} ${currentProfile.last_name}</div>
      <div style="font-size:13px;color:var(--text-muted);margin-top:4px">${currentProfile.email}</div>
      <div style="margin-top:10px;display:inline-block;background:rgba(22,163,74,0.12);border:1px solid rgba(22,163,74,0.2);border-radius:100px;padding:4px 12px;font-size:12px;font-weight:700;color:var(--green);font-family:'Space Grotesk',sans-serif">Ground Team Member</div>
    </div>
    <div class="section-label">Account</div>
    <div class="greeting-card">
      <div class="sheet-row"><span class="sheet-row-label" style="font-size:13px;color:var(--text-muted)">Name</span><span class="sheet-row-value" style="font-size:13px;color:var(--text-primary)">${currentProfile.first_name} ${currentProfile.last_name}</span></div>
      <div class="sheet-row"><span class="sheet-row-label" style="font-size:13px;color:var(--text-muted)">Email</span><span class="sheet-row-value" style="font-size:13px;color:var(--text-primary)">${currentProfile.email}</span></div>
      <div class="sheet-row" style="border-bottom:none"><span class="sheet-row-label" style="font-size:13px;color:var(--text-muted)">Phone</span><span class="sheet-row-value" style="font-size:13px;color:var(--text-primary)">${currentProfile.phone || '—'}</span></div>
    </div>
    <button onclick="signOut()" style="width:100%;padding:14px;background:rgba(220,38,38,0.1);border:1px solid rgba(220,38,38,0.2);border-radius:12px;color:var(--red);font-size:14px;font-weight:700;cursor:pointer;font-family:'Space Grotesk',sans-serif;margin-top:4px">Sign out</button>
  `;
}

async function openSheet(id){
  activeDispatchId = id;
  const inc = allDispatches.find(i => i.id === id);
  if(!inc) return;

  document.getElementById('sheet-ob').textContent = inc.ob_number;
  document.getElementById('sheet-title').textContent = TYPE_LABELS[inc.dispatch_type] || inc.dispatch_type;
  document.getElementById('sheet-client').textContent = inc.clients?.name || '—';
  document.getElementById('sheet-status').textContent = STATUS_LABELS[inc.status] || inc.status;
  document.getElementById('sheet-site').textContent = inc.site_address || '—';
  document.getElementById('sheet-created').textContent = formatDate(inc.created_at);

  const actionsEl = document.getElementById('sheet-action-buttons');
  actionsEl.innerHTML = '';

  const closed = ['closed','cancelled'].includes(inc.status);

  if(!closed){
    const nextStatus = getNextStatus(inc.status);
    if(nextStatus){
      const btn = document.createElement('button');
      btn.className = 'action-btn-full';
      btn.textContent = 'Mark ' + STATUS_LABELS[nextStatus];
      btn.onclick = () => updateMyStatus(nextStatus);
      actionsEl.appendChild(btn);
    }

    if(inc.status === 'on_scene' && !clockInTime){
      const clockBtn = document.createElement('button');
      clockBtn.className = 'action-btn-full green';
      clockBtn.textContent = 'Clock in on site';
      clockBtn.onclick = () => handleClockIn(inc);
      actionsEl.appendChild(clockBtn);
    }

    if(inc.status !== 'new'){
      const reqBtn = document.createElement('button');
      reqBtn.className = 'action-btn-full outline';
      reqBtn.textContent = 'Flag — requires action';
      reqBtn.onclick = () => updateMyStatus('requires_action');
      actionsEl.appendChild(reqBtn);
    }
  }

  const { data: updates } = await sb.from('dispatch_updates')
    .select('*,users(first_name,last_name)')
    .eq('incident_id', id)
    .order('created_at', { ascending: false });

  const timeline = document.getElementById('sheet-timeline');
  timeline.innerHTML = '';
  (updates || []).forEach(u => {
    const item = document.createElement('div');
    item.className = 'timeline-item';
    item.innerHTML = `
      <div class="timeline-dot"></div>
      <div class="timeline-content">
        <div class="timeline-status">${u.status_to ? STATUS_LABELS[u.status_to] : 'Update'}</div>
        <div class="timeline-time">${formatDate(u.created_at)} · ${u.users ? u.users.first_name : 'System'}</div>
        ${u.note ? '<div class="timeline-note">'+u.note+'</div>' : ''}
      </div>
    `;
    timeline.appendChild(item);
  });

  document.getElementById('sheet-overlay').classList.add('show');
}

function closeSheet(e){
  if(e.target === document.getElementById('sheet-overlay')){
    document.getElementById('sheet-overlay').classList.remove('show');
    activeDispatchId = null;
  }
}

function getNextStatus(current){
  const flow = ['new','dispatched','on_scene','handover','back_to_base','closed'];
  const idx = flow.indexOf(current);
  return idx >= 0 && idx < flow.length - 1 ? flow[idx + 1] : null;
}

async function updateMyStatus(newStatus){
  if(!activeDispatchId) return;
  const inc = allDispatches.find(i => i.id === activeDispatchId);
  if(!inc) return;

  const updates = { status: newStatus, updated_at: new Date().toISOString() };
  if(newStatus === 'dispatched' && !inc.dispatched_at) updates.dispatched_at = new Date().toISOString();
  if(newStatus === 'on_scene' && !inc.on_scene_at) updates.on_scene_at = new Date().toISOString();
  if(newStatus === 'closed') updates.closed_at = new Date().toISOString();

  const { error } = await sb.from('incidents').update(updates).eq('id', activeDispatchId);
  if(error){ showToast('Update failed. Try again.', 'error'); return; }

  await sb.from('dispatch_updates').insert({
    organisation_id: currentProfile.organisation_id,
    incident_id: activeDispatchId,
    user_id: currentUser.id,
    status_from: inc.status,
    status_to: newStatus,
    note: 'Updated by ' + currentProfile.first_name + ' (mobile)'
  });

  showToast('Status updated to ' + STATUS_LABELS[newStatus]);
  document.getElementById('sheet-overlay').classList.remove('show');
  await loadDispatches();
  renderDispatches();
}

function handleClockIn(inc){
  clockInTime = new Date().toISOString();
  clockInSite = inc.clients?.name || inc.site_address || 'On site';
  document.getElementById('sheet-overlay').classList.remove('show');
  showToast('Clocked in at ' + clockInSite);
  renderDispatches();
}

function handleClockOut(){
  const duration = formatDuration(clockInTime);
  clockInTime = null;
  clockInSite = null;
  if(clockTimer){ clearInterval(clockTimer); clockTimer = null; }
  showToast('Clocked out after ' + duration);
  renderDispatches();
}

function getTimeOfDay(){
  const h = new Date().getHours();
  if(h < 12) return 'morning';
  if(h < 17) return 'afternoon';
  return 'evening';
}

async function signOut(){
  if(realtimeChannel) sb.removeChannel(realtimeChannel);
  if(clockTimer) clearInterval(clockTimer);
  await sb.auth.signOut();
  window.location.href = '/login.html';
}

init();
</script>
</body>
</html>
